services:
  importer:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 4173
      DATABASE_PATH: /app/data/channel-records.sqlite
    ports:
      - "127.0.0.1:${IMPORTER_HOST_PORT:-4173}:4173"
    volumes:
      - importer-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  importer-data:
