<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 渠道导入</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1>Claude 渠道导入</h1>
        <p id="target-new-api" class="target-new-api">
          当前 New API：正在读取...
        </p>
      </header>

      <form id="import-form" autocomplete="off">
        <section class="panel">
          <label class="field">
            <span>Anthropic Key</span>
            <textarea
              id="keys"
              name="keys"
              rows="7"
              placeholder="每行粘贴一个 Key"
              spellcheck="false"
              required
            ></textarea>
          </label>
          <div class="key-summary">
            <span id="key-count">共 0 个有效 Key</span>
          </div>

          <div class="submit-row">
            <button id="import-button" class="button button-primary" type="submit">
              开始创建渠道
            </button>
          </div>
        </section>
      </form>

      <section id="result-panel" class="panel result-panel" aria-live="polite">
        <div class="result-header">
          <div>
            <h2>执行反馈</h2>
            <p id="result-summary">等待提交</p>
          </div>
          <div class="result-counters">
            <span class="counter counter-total">总数 <strong id="total-count">0</strong></span>
            <span class="counter counter-success">成功 <strong id="success-count">0</strong></span>
            <span class="counter counter-failure">失败 <strong id="failure-count">0</strong></span>
          </div>
        </div>
        <div id="progress-bar" class="progress-track" aria-hidden="true">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="result-list" class="result-list">
          <div class="empty-state">提交后将在这里逐条显示创建结果。</div>
        </div>
      </section>

      <section class="panel history-panel" aria-live="polite">
        <div class="history-header">
          <div>
            <h2>已导入渠道</h2>
            <p id="history-summary">正在读取本地记录...</p>
          </div>
          <button id="sync-records-button" class="button button-secondary" type="button">
            刷新渠道用量
          </button>
        </div>
        <form id="history-search-form" class="history-search-form" autocomplete="off">
          <input
            id="history-key-search"
            type="password"
            placeholder="粘贴完整 Key 精确查询"
            spellcheck="false"
          >
          <button class="button button-secondary" type="submit">查询</button>
          <button id="clear-history-search" class="button button-secondary" type="button">
            清除
          </button>
        </form>
        <div class="history-table-shell">
          <table class="history-table">
            <thead>
              <tr>
                <th>渠道</th>
                <th>Key</th>
                <th>状态</th>
                <th>累计用量</th>
                <th>导入时间</th>
                <th>最后同步</th>
              </tr>
            </thead>
            <tbody id="history-table-body">
              <tr>
                <td class="history-empty" colspan="6">暂时没有通过本工具导入的渠道。</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="history-pagination">
          <span id="history-page-summary">第 1 / 1 页</span>
          <div>
            <button id="previous-history-page" class="button button-secondary" type="button">
              上一页
            </button>
            <button id="next-history-page" class="button button-secondary" type="button">
              下一页
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
